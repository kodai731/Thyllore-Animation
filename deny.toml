# cargo-deny configuration (v0.19+)
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Treat unmaintained crates as warnings
unmaintained = "workspace"
# Treat yanked crates as errors
yanked = "deny"
# Known unmaintained crates we accept for now
ignore = [
    "RUSTSEC-2025-0141", # bincode - no direct replacement yet, evaluate alternatives later
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Zlib",
    "0BSD",
    "Unlicense",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "PDDL-1.0",
    "CDLA-Permissive-2.0",
    "OpenSSL",
    "LGPL-2.1-or-later",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "unicode-ident"
expression = "(MIT OR Apache-2.0) AND Unicode-3.0"
license-files = [{ path = "LICENSE-UNICODE", hash = 0xb1e0b833 }]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
